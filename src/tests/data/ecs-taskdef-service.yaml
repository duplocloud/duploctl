Family: duploctl-svc
Cpu: '256'
Memory: '512'
ContainerDefinitions:
- Essential: true
  Image: public.ecr.aws/nginx/nginx:stable-alpine
  Name: app
  PortMappings:
  - ContainerPort: 80
    HostPort: 80
    Protocol:
      Value: tcp
  LogConfiguration:
    LogDriver:
      Value: awslogs
    Options:
      awslogs-create-group: 'true'
      awslogs-group: /ecs/duploctl-svc
      awslogs-region: us-east-2
      awslogs-stream-prefix: ecs
    SecretOptions: []
InferenceAccelerators: []
NetworkMode:
  Value: awsvpc
RuntimePlatform:
  CpuArchitecture:
    Value: X86_64
  OperatingSystemFamily:
    Value: LINUX
RequiresCompatibilities:
- EC2
