name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: GHA environment with DUPLO_HOST and DUPLO_TOKEN
        type: environment
      suite:
        required: true
        description: Test suite to run
        type: choice
        options:
        - k8s
        - aws
        - ecs
      infra:
        required: false
        description: Pre-existing infra name. Empty lets conftest generate a random name.
        type: string
      tenant:
        required: false
        description: Pre-existing tenant name. Empty mirrors infra name.
        type: string
      python_version:
        required: false
        description: Python version
        default: "3.13"
        type: choice
        options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      enabled:
        description: Run the integration tests. False skips all jobs and immediately returns success.
        required: false
        type: boolean
        default: false
      suite:
        required: true
        type: string
      infra:
        required: false
        type: string
      tenant:
        required: false
        type: string
      python_version:
        required: false
        type: string
        default: "3.13"
    secrets:
      DUPLO_TOKEN:
        description: DuploCloud API token
        required: true
      GH_APP_KEY:
        description: GitHub App private key for checkout
        required: true

jobs:

  lifecycle:
    name: Lifecycle (${{ inputs.suite }})
    if: inputs.enabled == '' || inputs.enabled == true
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      DUPLO_HOST: ${{ vars.DUPLO_HOST }}
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
    outputs:
      infra: ${{ steps.names.outputs.infra }}
      tenant: ${{ steps.names.outputs.tenant }}
      matrix: ${{ steps.suite.outputs.matrix }}
      owned: ${{ steps.owned.outputs.owned }}
    steps:

    - name: Setup
      uses: duplocloud/duploctl/.github/actions/setup@main
      with:
        install: ".[build,test,aws]"
        python-version: ${{ inputs.python_version }}
        app-id: ${{ vars.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_KEY }}

    - name: Set owned flag
      id: owned
      env:
        INFRA: ${{ inputs.infra }}
        TENANT: ${{ inputs.tenant }}
      run: |
        if [ -z "$INFRA" ] && [ -z "$TENANT" ]; then OWNED=true; else OWNED=false; fi
        echo "owned=$OWNED" >> $GITHUB_OUTPUT

    - name: Load suite matrix
      id: suite
      shell: python
      run: |
        import yaml, json, os
        data = yaml.safe_load(open('src/tests/suites/${{ inputs.suite }}.yaml'))
        matrix = json.dumps(data['jobs'])
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"matrix={matrix}\n")

    - name: Run lifecycle tests
      env:
        INFRA: ${{ inputs.infra }}
        TENANT: ${{ inputs.tenant }}
      run: |
        ARGS=(src -m "integration and lifecycle" --no-cov --junit-xml=lifecycle-results.xml -v --names-file=.names --no-teardown)
        if [ -n "$INFRA" ]; then ARGS+=(--infra "$INFRA"); fi
        if [ -n "$TENANT" ]; then ARGS+=(--tenant "$TENANT"); fi
        pytest "${ARGS[@]}"

    - name: Export resolved names
      id: names
      if: always()
      run: |
        if [ -f .names ]; then
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < .names
        fi

    - name: Surface results
      if: always()
      uses: pmeier/pytest-results-action@main
      with:
        path: lifecycle-results.xml
        summary: true
        display-options: fEX
        fail-on-empty: true

  resources:
    name: ${{ matrix.name }} (${{ inputs.suite }})
    needs: lifecycle
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      DUPLO_HOST: ${{ vars.DUPLO_HOST }}
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.lifecycle.outputs.matrix) }}
    steps:

    - name: Setup
      uses: duplocloud/duploctl/.github/actions/setup@main
      with:
        install: ".[build,test,aws]"
        python-version: ${{ inputs.python_version }}
        app-id: ${{ vars.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_KEY }}

    - name: Run ${{ matrix.name }} tests
      env:
        INFRA: ${{ needs.lifecycle.outputs.infra }}
        TENANT: ${{ needs.lifecycle.outputs.tenant }}
        MARKERS: ${{ matrix.markers }}
        NAME: ${{ matrix.name }}
      run: |
        ARGS=(src -m "$MARKERS" --no-cov --junit-xml="${NAME}-results.xml" -v)
        if [ -n "$INFRA" ]; then ARGS+=(--infra "$INFRA"); fi
        if [ -n "$TENANT" ]; then ARGS+=(--tenant "$TENANT"); fi
        pytest "${ARGS[@]}"

    - name: Surface results
      if: always()
      uses: pmeier/pytest-results-action@main
      with:
        path: ${{ matrix.name }}-results.xml
        summary: true
        display-options: fEX
        fail-on-empty: true

  teardown:
    name: Teardown (${{ inputs.suite }})
    needs: [lifecycle, resources]
    if: (inputs.enabled == '' || inputs.enabled == true) && always()
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      DUPLO_HOST: ${{ vars.DUPLO_HOST }}
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
    steps:

    - name: Setup
      uses: duplocloud/duploctl/.github/actions/setup@main
      with:
        install: ".[build,test,aws]"
        python-version: ${{ inputs.python_version }}
        app-id: ${{ vars.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_KEY }}

    - name: Run teardown
      env:
        INFRA: ${{ needs.lifecycle.outputs.infra }}
        TENANT: ${{ needs.lifecycle.outputs.tenant }}
        OWNED: ${{ needs.lifecycle.outputs.owned }}
      run: |
        ARGS=(src -m "integration and lifecycle" --no-cov --junit-xml=teardown-results.xml -v)
        if [ -n "$INFRA" ]; then ARGS+=(--infra "$INFRA"); fi
        if [ -n "$TENANT" ]; then ARGS+=(--tenant "$TENANT"); fi
        if [ "$OWNED" = "true" ]; then ARGS+=(--owned); fi
        pytest "${ARGS[@]}"

    - name: Surface results
      if: always()
      uses: pmeier/pytest-results-action@main
      with:
        path: teardown-results.xml
        summary: true
        display-options: fEX
        fail-on-empty: true
