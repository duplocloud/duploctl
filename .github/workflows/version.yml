name: Bump Version

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to take'
        required: true
        default: 'patch'
        type: choice
        options:
        - 'patch'
        - 'minor'
        - 'major'
      push:
        description: 'Push changes to remote'
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      action:
        description: 'Action to take'
        default: 'patch'
        type: string
      push:
        description: 'Push changes to remote'
        default: false
        type: boolean
    outputs:
      tag: 
        value: ${{ jobs.version.outputs.tag }}
      version: 
        value: ${{ jobs.version.outputs.version }}
    secrets:
      GH_APP_KEY:
        description: GitHub App private key
        required: true

jobs:
  version:
    name: Bump
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:

    - name: Setup
      id: setup
      uses: duplocloud/duploctl/.github/actions/setup@main
      with:
        install: ".[build]"
        fetch-depth: 0
        app-id: ${{ vars.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_KEY }}
        submodules: "true"
        
    - name: Bump Version
      id: bump
      run: >-
        ./scripts/version.py 
        --action ${{ inputs.action }} 
        --push ${{ inputs.push }} 
        --token ${{ steps.setup.outputs.token }}

    - name: Upload Notes
      env:
        TAG: ${{ steps.bump.outputs.tag }}
      run: echo "artifact_name=notes-${TAG//\//-}" >> $GITHUB_ENV

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ env.artifact_name }}
        path: dist/notes.md
